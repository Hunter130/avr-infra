services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=5001 
      - HTTP_PORT=6001
      - STS_URL=ws://avr-sts-gemini:6037  
    ports:
      - 5001:5001
    networks:
      - avr

  avr-sts-gemini:
    build: ./avr-sts-gemini
    platform: linux/x86_64
    container_name: avr-sts-gemini
    restart: always
    environment:
      - PORT=6037
      - GEMINI_API_KEY=$GEMINI_API_KEY
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
      - GEMINI_INSTRUCTIONS=${GEMINI_INSTRUCTIONS:-You are a helpful assistant}
      - GEMINI_VOICE=${GEMINI_VOICE:-Puck}
      - GEMINI_THINKING_LEVEL=${GEMINI_THINKING_LEVEL:-MINIMAL}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:-0}
      - N8N_WEBHOOK_URL=$N8N_WEBHOOK_URL
      - POST_CALL_ANALYSIS_PROVIDER=$POST_CALL_ANALYSIS_PROVIDER
      - DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
      - DEEPGRAM_API_KEY=$DEEPGRAM_API_KEY
      - AMI_URL=${AMI_URL:-http://avr-ami:6006}
    env_file:
      - agents.env
    # volumes: # uncomment if you want to use the custom tools
    #   - ./tools:/usr/src/app/tools
    networks:
      - avr

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - 5038:5038
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - 8088:8088
      - 8089:8089
      - "10000-10050:10000-10050/udp"
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
      - ./asterisk/conf/queues.conf:/etc/asterisk/my_queues.conf
      - ./asterisk/conf/ari.conf:/etc/asterisk/my_ari.conf
      - ./asterisk_dynamic:/etc/asterisk/dynamic
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=6006
      - AMI_HOST=${AMI_HOST:-avr-asterisk}
      - AMI_PORT=${AMI_PORT:-5038}
      - AMI_USERNAME=${AMI_USERNAME:-avr}
      - AMI_PASSWORD=${AMI_PASSWORD:-avr}
    ports:
      - 6006:6006
    networks:
      - avr

  agent-api:
    build: ./agent-api
    platform: linux/x86_64
    container_name: agent-api
    restart: always
    environment:
      - SUPABASE_URL=$SUPABASE_URL
      - SUPABASE_KEY=$SUPABASE_KEY
      - API_KEY=$API_KEY
      - DYNAMIC_CONF_DIR=/etc/asterisk/dynamic
      - AGENTS_ENV_FILE=/app/agents.env
      - COMPOSE_FILE=docker-compose-gemini.yml
      - COMPOSE_DIR=/infra
      - ASTERISK_CONTAINER=avr-asterisk
    volumes:
      - ./asterisk_dynamic:/etc/asterisk/dynamic
      - ./agents.env:/app/agents.env
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/infra
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-api.rule=Host(`api.roda-ia.com`)"
      - "traefik.http.routers.agent-api.entrypoints=websecure"
      - "traefik.http.routers.agent-api.tls=true"
      - "traefik.http.services.agent-api.loadbalancer.server.port=3000"
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          