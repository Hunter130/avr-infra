[avr]
exten => s,1,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 same => n,Set(UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,Set(DENOISE(rx)=on)
 ;same => n,Dial(AudioSocket/${ARG1}/${UUID}/c(slin16))
 same => n,MixMonitor(${UUID}.wav)
 same => n,Dial(AudioSocket/${ARG1}/${UUID})
 same => n,Hangup()

[demo]

exten => 5001,1,GoSub(avr,s,1(avr-core:5001))
exten => 5002,1,GoSub(avr,s,1(host.docker.internal:5001))

[demo]
exten => 5003,1,NoOp(Exten 5003 with http web service)
 same => n,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 same => n,Set(UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,Set(JSON_BODY={"uuid":"${UUID}","payload":{"from":"${CALLERID(num)}","to":"${EXTEN}","uniqueid":"${UNIQUEID}","channel":"${CHANNEL}","recording": false}})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(JSON_RESPONSE=${CURL(http://avr-core:6001/call,${JSON_BODY})})
 same => n,NoOp(JSON_BODY: ${JSON_BODY})
 same => n,NoOp(JSON_RESPONSE: ${JSON_RESPONSE})
 same => n,Set(DENOISE(rx)=on)
 same => n,MixMonitor(${UUID}.wav)
 same => n,Dial(AudioSocket/avr-core:5001/${UUID})
 same => n,Hangup()

 [demo]
; Permitir llamadas entre extensiones locales de 4 dígitos (ej: 1000, 2000, 4000)
exten => _XXXX,1,NoOp(Llamada interna a extension ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

include => outbound-vonage

[outbound-vonage]
exten => _X.,1,Set(OUTBOUND_REQ=${EXTEN})
 same => n,Goto(outbound-vonage-process,s,1)

exten => _+X.,1,Set(OUTBOUND_REQ=${EXTEN})
 same => n,Goto(outbound-vonage-process,s,1)

[outbound-vonage-process]
exten => s,1,NoOp(Processing outbound call request for ${OUTBOUND_REQ})
 same => n,Set(CHANNEL(hangup_handler_push)=outbound-unanswered-handler,clear-queue,1)
 same => n,Set(FIELD_COUNT=${FIELDQTY(OUTBOUND_REQ,*)})
 same => n,GotoIf($[${FIELD_COUNT} > 2]?with_cid_and_agent:check_two_fields)
 
 same => n(check_two_fields),GotoIf($[${FIELD_COUNT} > 1]?with_cid:no_cid)

 same => n(with_cid_and_agent),Set(MY_TEMP_VAR=${OUTBOUND_REQ})
 same => n,Set(MY_CALLERID=${SHIFT(MY_TEMP_VAR,*)})
 same => n,Set(CUSTOMER_NUMBER=${SHIFT(MY_TEMP_VAR,*)})
 same => n,Set(AGENT_ID=${MY_TEMP_VAR})
 same => n,Goto(dial)

 same => n(with_cid),Set(MY_TEMP_VAR=${OUTBOUND_REQ})
 same => n,Set(MY_CALLERID=${SHIFT(MY_TEMP_VAR,*)})
 same => n,Set(CUSTOMER_NUMBER=${MY_TEMP_VAR})
 same => n,Set(AGENT_ID=)
 same => n,Goto(dial)
 
 same => n(no_cid),Set(MY_CALLERID=525593178271)
 same => n,Set(CUSTOMER_NUMBER=${OUTBOUND_REQ})
 same => n,Set(AGENT_ID=)
 same => n,Goto(dial)

 same => n(dial),NoOp(Dialing ${CUSTOMER_NUMBER} with callerID ${MY_CALLERID} and agentID ${AGENT_ID})
 same => n,Set(CALL_DIRECTION=outbound)
 same => n,Set(OUTBOUND_CALLERID=${MY_CALLERID})
 same => n,Set(CALLERID(num)=${MY_CALLERID})
 same => n,Set(DIAL_DEST=${CUSTOMER_NUMBER})
 same => n,Dial(PJSIP/${DIAL_DEST}@vonage,,m)
 same => n,Hangup()

[from-vonage]
exten => _X.,1,NoOp(Inbound call from Vonage to ${EXTEN})
 same => n,Set(__OUTBOUND_CALLERID=${EXTEN})
 same => n,Goto(demo,6002,1)

exten => _+X.,1,NoOp(Inbound call from Vonage to ${EXTEN})
 same => n,Set(__OUTBOUND_CALLERID=${EXTEN})
 same => n,Goto(demo,6002,1)

[from-callcenter]
exten => _X.,1,NoOp(Inbound call from Call Center to ${EXTEN})
 same => n,Goto(demo,${EXTEN},1)

exten => _+X.,1,NoOp(Inbound call from Call Center to ${EXTEN})
 same => n,Goto(demo,${EXTEN},1)

; ── Agentes dinámicos ────────────────────────────────────────────
; Las extensiones 6000-6999 con sus contextos se generan aquí:
#include /etc/asterisk/dynamic/extensions_dynamic.conf

[billing-handler]
exten => s,1,NoOp(Hangup Handler for Billing)
 same => n,GotoIf($["${IS_TRANSFER}"!="1"]?skip)
 same => n,Set(CALL_END=${EPOCH})
 same => n,Set(DURATION=$[${CALL_END} - ${CALL_START}])
 same => n,Set(JSON_BODY={"uuid":"${UUID}","agentId":"${AGENT_ID}","duration":"${DURATION}","billsec":"${DURATION}"})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(RES=${CURL(http://avr-sts-gemini:6037/billing-webhook,${JSON_BODY})})
 same => n(skip),Return()

[warm-transfer]
exten => _X.,1,NoOp(Warm transfer to ${EXTEN})
 same => n,Set(IS_TRANSFER=1)
 same => n,Set(CALLERID(num)=${IF($["${OUTBOUND_CALLERID}"=""]?525593178271:${OUTBOUND_CALLERID})})
 same => n,Set(DIAL_DEST=${EXTEN})
 same => n,Dial(PJSIP/${DIAL_DEST}@vonage,,mU(whisper^${UUID}))
 same => n,Hangup()

exten => _+X.,1,NoOp(Warm transfer to ${EXTEN})
 same => n,Set(IS_TRANSFER=1)
 same => n,Set(CALLERID(num)=${IF($["${OUTBOUND_CALLERID}"=""]?525593178271:${OUTBOUND_CALLERID})})
 same => n,Set(DIAL_DEST=${EXTEN})
 same => n,Dial(PJSIP/${DIAL_DEST}@vonage,,mU(whisper^${UUID}))
 same => n,Hangup()

[whisper]
exten => s,1,NoOp(Whispering summary to agent)
 same => n,Playback(/var/spool/asterisk/monitor/whisper_${ARG1})
 same => n,Return()

[outbound-unanswered-handler]
exten => clear-queue,1,NoOp(Outbound Unanswered Hangup Handler. Dial Status: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?skip)
 same => n,Set(UNANSWERED_BODY={"phoneNumber":"${CUSTOMER_NUMBER}","dialStatus":"${DIALSTATUS}","agentId":"${AGENT_ID}"})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(UNANSWERED_RES=${CURL(http://avr-sts-gemini:6037/call-unanswered,${UNANSWERED_BODY})})
 same => n,NoOp(Response from call-unanswered: ${UNANSWERED_RES})
 same => n(skip),Return()

