[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
local_net=127.0.0.1/32
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
external_media_address=sip.asterisk.rodaia.com
external_signaling_address=sip.asterisk.rodaia.com

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0
local_net=127.0.0.1/32
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
external_media_address=sip.asterisk.rodaia.com
external_signaling_address=sip.asterisk.rodaia.com

[transport-udp-tailscale]
type=transport
protocol=udp
bind=0.0.0.0:5066
local_net=127.0.0.1/32
local_net=172.20.0.0/24
local_net=192.168.0.0/16
external_media_address=100.83.104.96
external_signaling_address=100.83.104.96

[transport-tcp-tailscale]
type=transport
protocol=tcp
bind=0.0.0.0:5066
local_net=127.0.0.1/32
local_net=172.20.0.0/24
local_net=192.168.0.0/16
external_media_address=100.83.104.96
external_signaling_address=100.83.104.96

[endpoint-template](!)
type=endpoint
transport=transport-udp
context=demo
disallow=all
allow=ulaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
rtp_timeout=60
rtp_timeout_hold=300

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0
local_net=127.0.0.1/32
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
external_media_address=sip.asterisk.rodaia.com
external_signaling_address=sip.asterisk.rodaia.com

[webrtc-template](!)
type=endpoint
transport=transport-wss
webrtc=yes
context=demo
message_context=avr-message-context
subscribe_context=avr-subscribe-context
allow_subscribe=yes
device_state_busy_at=1
disallow=all
allow=ulaw,alaw,vp9,vp8,h264
rtp_timeout=60
rtp_timeout_hold=300
media_address=100.83.104.96

